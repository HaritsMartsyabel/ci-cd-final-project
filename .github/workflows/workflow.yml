name: CI pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        pip install flake8
        pip install nose

    - name: Lint with flake8
      run: flake8 .

    - name: Run unit tests
      run: nosetests
